name: SupaChat CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: supachat-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Backend syntax smoke check
        run: python -m compileall backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Prepare CI env files
        run: |
          cp backend/.env.example backend/.env
          cp .env.compose.example .env.compose

      - name: Validate Docker Compose files
        run: docker compose --env-file .env.compose -f docker-compose.yml -f docker-compose.build.yml config > /tmp/supachat-compose.yaml

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          BACKEND_IMAGE="ghcr.io/${OWNER_LC}/supachat-backend:${GITHUB_SHA}"
          FRONTEND_IMAGE="ghcr.io/${OWNER_LC}/supachat-frontend:${GITHUB_SHA}"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/supachat-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/supachat-frontend:latest

  deploy-azure-vm:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure Ubuntu VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          MCP_IMAGE: ${{ needs.build-and-push.outputs.backend_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          APP_DIR: ${{ secrets.AZURE_VM_APP_DIR }}
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: ${{ secrets.AZURE_VM_SSH_PORT }}
          envs: BACKEND_IMAGE,FRONTEND_IMAGE,MCP_IMAGE,GHCR_USER,GHCR_PAT,APP_DIR
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-/opt/supachat}"

            if [ ! -d "${APP_DIR}" ]; then
              echo "Application directory ${APP_DIR} does not exist on the VM."
              exit 1
            fi

            cd "${APP_DIR}"

            if [ -d ".git" ]; then
              git fetch origin main
              git checkout main
              git reset --hard origin/main
            else
              echo "No .git directory found in ${APP_DIR}; using existing VM project files."
            fi

            echo "${GHCR_PAT}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            export BACKEND_IMAGE FRONTEND_IMAGE MCP_IMAGE
            bash scripts/deploy-azure.sh
