worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20m;
    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    proxy_cache_path /var/cache/nginx/static
        levels=1:2
        keys_zone=static_cache:20m
        max_size=512m
        inactive=1h
        use_temp_path=off;

    upstream supachat_frontend {
        server frontend:80;
        keepalive 16;
    }

    upstream supachat_backend {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        location /api/ {
            proxy_pass http://supachat_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location = /health {
            proxy_pass http://supachat_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            proxy_cache static_cache;
            proxy_cache_valid 200 30m;
            proxy_pass http://supachat_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=1800";
            expires 30m;
        }

        location / {
            proxy_pass http://supachat_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-store";
        }
    }
}
